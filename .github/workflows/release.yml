name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            asset: rune-darwin-arm64
          - runner: macos-15-intel
            asset: rune-darwin-amd64
          - runner: ubuntu-24.04
            asset: rune-linux-amd64
          - runner: ubuntu-24.04-arm
            asset: rune-linux-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Linux build dependencies
        if: startsWith(matrix.runner, 'ubuntu-')
        run: sudo apt-get update && sudo apt-get install -y libx11-dev
      - name: Build release asset
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o "dist/${{ matrix.asset }}" ./cmd/rune
      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
